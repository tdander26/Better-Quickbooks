name: Deploy to Cloudflare Workers

# Auto-build + deploy the "ledger" Worker on every push to main — no manual
# `npm run cf:deploy` needed. Runtime secrets (TURSO_*, AUTH_SECRET,
# ENCRYPTION_KEY, SEED_USER_EMAIL) live on the Worker via `wrangler secret put`
# and persist across deploys, so this workflow only needs a Cloudflare API token.
#
# ONE-TIME SETUP (repo → Settings → Secrets and variables → Actions):
#   - CLOUDFLARE_API_TOKEN  — a token with the "Edit Cloudflare Workers" template
#   - CLOUDFLARE_ACCOUNT_ID — your Cloudflare account id
# Until CLOUDFLARE_API_TOKEN is set, this workflow runs but cleanly skips the
# build/deploy (green check, no failure).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip notice (no Cloudflare token configured)
        if: env.HAS_TOKEN != 'true'
        run: echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping deploy. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo Settings → Secrets → Actions to enable push-to-main auto-deploy."

      - uses: actions/setup-node@v4
        if: env.HAS_TOKEN == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: env.HAS_TOKEN == 'true'
        run: npm ci

      - name: Build (OpenNext for Cloudflare — demo login enabled)
        if: env.HAS_TOKEN == 'true'
        run: npm run cf:build
        env:
          NEXT_PUBLIC_DEMO_LOGIN: "1"

      - name: Deploy to Cloudflare Workers
        if: env.HAS_TOKEN == 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
